<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشهد السينمائي - التلفاز القديم</title>
    <style>
        :root {
            --wood: #2c1b0e;
            --screen-glow: rgba(100, 150, 255, 0);
            --candle-light: rgba(255, 147, 41, 0.2);
        }

        body {
            margin: 0;
            height: 100vh;
            background: #020202;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1500px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تأثير الغبار المتطاير */
        .dust {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1;
            pointer-events: none;
        }

        /* الغرفة المهجورة */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* تصميم التلفاز 3D */
        .tv-box {
            position: relative;
            width: 450px;
            height: 350px;
            transform-style: preserve-3d;
            z-index: 2;
        }

        /* الأوجه الستة للتلفاز */
        .tv-face {
            position: absolute;
            background: var(--wood);
            border: 2px solid #1a0f08;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        .front { width: 450px; height: 350px; transform: translateZ(50px); border-radius: 15px; border: 20px solid #1a0f08; box-sizing: border-box; }
        .back { width: 450px; height: 350px; transform: translateZ(-50px) rotateY(180deg); background: #111; }
        .left { width: 100px; height: 350px; transform: translateX(-50px) rotateY(-90deg); }
        .right { width: 100px; height: 350px; transform: translateX(400px) rotateY(90deg); }
        .top { width: 450px; height: 100px; transform: translateY(-50px) rotateX(90deg); }
        .bottom { width: 450px; height: 100px; transform: translateY(300px) rotateX(-90deg); }

        /* الشاشة وتأثيراتها */
        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #050505;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #display-media, #display-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2) brightness(0.8) sepia(0.2);
            display: none;
        }

        /* خطوط الشاشة القديمة */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* الشمعة */
        .candle-stick {
            position: absolute;
            bottom: -80px;
            right: -120px;
            width: 30px;
            height: 120px;
            background: #d4d4d4;
            transform: translateZ(80px);
            border-radius: 4px;
        }

        .flame {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 30px;
            background: radial-gradient(#fff, #ff9d00, #ff5e00);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff9d00, 0 0 50px #ff5e00;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); opacity: 0.8; }
        }

        /* لوحة التحكم */
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #444;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        input[type="file"] { display: none; }
        .btn {
            background: #e67e22;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            border: none;
        }
        .btn:hover { background: #d35400; transform: translateY(-2px); }

        /* حالة التشغيل والإطفاء */
        .tv-off #display-media, .tv-off #display-video { display: none !important; }
        .tv-off .screen-container { background: #000; }
        .tv-off .screen-container::after {
            content: "";
            position: absolute;
            width: 4px; height: 4px; background: white; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body class="tv-off">

    <div class="dust" id="dust-layer"></div>

    <div class="scene" id="scene">
        <div class="tv-box" id="tv">
            <div class="tv-face front">
                <div class="screen-container">
                    <div class="crt-overlay"></div>
                    <video id="display-video" loop></video>
                    <img id="display-media" alt="محتوى التلفاز">
                </div>
            </div>
            <div class="tv-face back"></div>
            <div class="tv-face left"></div>
            <div class="tv-face right"></div>
            <div class="tv-face top"></div>
            <div class="tv-face bottom"></div>
        </div>

        <div class="candle-stick">
            <div class="flame"></div>
        </div>
    </div>

    <div class="ui-panel">
        <button class="btn" onclick="togglePower()">تشغيل / إطفاء</button>
        <label class="btn" for="file-upload">اختيار ملف (فيديو/صورة)</label>
        <input type="file" id="file-upload" accept="image/*,video/*" onchange="handleFile(this)">
        <span id="status" style="font-size: 12px; color: #aaa;">التلفاز مطفأ</span>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const tv = document.getElementById('tv');
        const video = document.getElementById('display-video');
        const image = document.getElementById('display-media');
        const statusText = document.getElementById('status');

        // حركة 3D تفاعلية مع الماوس
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            scene.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // تشغيل وإطفاء التلفاز
        function togglePower() {
            document.body.classList.toggle('tv-off');
            const isOff = document.body.classList.contains('tv-off');
            
            if (isOff) {
                video.pause();
                statusText.innerText = "التلفاز مطفأ";
            } else {
                if (video.src) video.play();
                statusText.innerText = "التلفاز يعمل";
            }
        }

        // معالجة الملفات المرفوعة
        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            const fileType = file.type;

            reader.onload = function(e) {
                if (fileType.includes('video')) {
                    image.style.display = 'none';
                    video.style.display = 'block';
                    video.src = e.target.result;
                    if (!document.body.classList.contains('tv-off')) video.play();
                } else if (fileType.includes('image')) {
                    video.style.display = 'none';
                    image.style.display = 'block';
                    image.src = e.target.result;
                    video.pause();
                }
            };

            reader.readAsDataURL(file);
        }

        // إضافة جزيئات غبار بسيطة
        const dustContainer = document.getElementById('dust-layer');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = '2px';
            particle.style.height = '2px';
            particle.style.background = 'rgba(255,255,255,0.1)';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.borderRadius = '50%';
            dustContainer.appendChild(particle);
        }
    </script>
</body>
</html>
